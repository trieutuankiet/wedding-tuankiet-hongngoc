<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tuấn Kiệt & Hồng Ngọc</title>

<!-- Logo chữ Hỷ màu đỏ -->
<link rel="icon" href='data:image/svg+xml,
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
<text y=".9em" font-size="90" fill="red">囍</text>
</svg>'>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
    font-family:'Montserrat',sans-serif;
    background:#8B0000;
    color:white;
    scroll-behavior:smooth;
    overflow-x:hidden;
}

section{
    padding:100px 20px;
    text-align:center;
    opacity:0;
    transform:translateY(40px);
    transition:all 1s ease;
}

section.show{
    opacity:1;
    transform:translateY(0);
}

h1,h2{
    font-family:'Playfair Display',serif;
}

/* HERO */
.hero{
    min-height:100vh;
    background:url('anh.JPG') center/cover no-repeat;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    position:relative;
}

.hero::after{
    content:'';
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(139,0,0,0.65);
    top:0;left:0;
}

.hero-content{
    position:relative;
    z-index:2;
}

.hero h1{
    font-size:60px;
    letter-spacing:3px;
}

.date{
    margin-top:20px;
    font-size:28px;
}

.countdown{
    margin-top:20px;
    font-size:22px;
}

/* CARD */
.card{
    max-width:600px;
    margin:30px auto;
    padding:40px;
    border:1px solid rgba(255,255,255,0.3);
    border-radius:15px;
    background:rgba(255,255,255,0.08);
}

/* BUTTON */
button{
    padding:12px 25px;
    border:none;
    background:#ff2e2e;
    color:white;
    border-radius:30px;
    cursor:pointer;
}

/* INPUT */
input{
    padding:12px;
    margin:10px;
    width:250px;
    border:none;
    border-radius:8px;
}

/* QR */
.qr-section img{
    width:250px;
    margin-top:20px;
    border-radius:15px;
}

/* FOOTER */
footer{
    background:#5a0000;
    padding:40px;
}

/* HOA RƠI ĐỎ */
.flower{
    position:fixed;
    top:-50px;
    font-size:20px;
    animation:fall linear infinite;
    color:#ff4d4d;
    pointer-events:none;
}

@keyframes fall{
    to{
        transform:translateY(110vh);
    }
}
</style>
</head>

<body>

<section class="hero show">
<div class="hero-content">
<h1>Tuấn Kiệt ❤️ Hồng Ngọc</h1>
<p class="date">29 . 03 . 2026</p>
<div class="countdown" id="countdown"></div>
</div>
</section>

<section>
<h2>Lễ Thành Hôn</h2>
<div class="card">
<p>⏰ 16:30 - 18:00 | Chủ Nhật</p>
<p>📅 29/03/2026 (11/02 Âm lịch)</p>
<p>📍 Tại tư gia nhà gái</p>
<p>Thôn Hạ 1, xã Sơn Động, tỉnh Bắc Ninh</p>
<a href="https://maps.google.com" target="_blank">
<button style="margin-top:20px;">Xem bản đồ</button>
</a>
</div>
</section>

<section>
<h2>Xác nhận tham dự</h2>
<p id="guestName"></p>
<form>
<input type="text" placeholder="Tên của bạn">
<br>
<button type="submit">Gửi xác nhận</button>
</form>
</section>

<section class="qr-section">
<h2>Gửi lời chúc tại</h2>
<img src="qr.jpg" alt="QR chuyển khoản">
</section>

<footer>
Tuấn Kiệt ❤️ Hồng Ngọc | 2026
</footer>

<!-- NHẠC -->
<audio autoplay loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<script>
// Đếm ngược
var weddingDate = new Date("March 29, 2026 00:00:00").getTime();
setInterval(function(){
var now = new Date().getTime();
var distance = weddingDate - now;
var days = Math.floor(distance/(1000*60*60*24));
var hours = Math.floor((distance%(1000*60*60*24))/(1000*60*60));
document.getElementById("countdown").innerHTML =
"Còn " + days + " ngày " + hours + " giờ";
},1000);

// Scroll effect
window.addEventListener("scroll",function(){
document.querySelectorAll("section").forEach(function(sec){
if(sec.getBoundingClientRect().top < window.innerHeight-100){
sec.classList.add("show");
}
});
});

// Hoa rơi đỏ
for(let i=0;i<30;i++){
let flower=document.createElement("div");
flower.classList.add("flower");
flower.innerHTML="❀";
flower.style.left=Math.random()*100+"vw";
flower.style.animationDuration=(5+Math.random()*5)+"s";
flower.style.fontSize=(15+Math.random()*25)+"px";
document.body.appendChild(flower);
}

// Cá nhân hóa link
const params = new URLSearchParams(window.location.search);
const name = params.get("guest");
if(name){
document.getElementById("guestName").innerHTML =
"Thân gửi <strong>"+ name +"</strong> 💌";
}
</script>

</body>
</html>
